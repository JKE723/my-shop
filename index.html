<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GRIDLINE – Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            transition: 0.2s;
        }

        .item:hover {
            transform: scale(1.03);
        }

        .item img {
            width: 100%;
            border-radius: 10px;
        }

        .item-title {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>GRIDLINE – Product Gallery</h1>

<div class="gallery">

    <a class="item" href="item1.html">
        <img src="item1.jpg" alt="Item 1">
        <div class="item-title">Item 1</div>
    </a>

    <a class="item" href="item2.html">
        <img src="item2.jpg" alt="Item 2">
        <div class="item-title">Item 2</div>
    </a>

    <a class="item" href="item3.html">
        <img src="item3.jpg" alt="Item 3">
        <div class="item-title">Item 3</div>
    </a>

</div>

</body>
</html>
